services:
  - type: web
    name: aviai-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: USE_MOCK_DATA
        value: "false"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com/v1
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_VISION_MODEL
        value: deepseek-chat
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.0"
